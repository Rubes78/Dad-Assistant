<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatharr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #a78bfa;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1::before { content: '✦'; font-size: 1rem; }

    .header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #reset-btn, #settings-btn, #history-btn {
      background: none;
      border: 1px solid #3a3a5c;
      color: #9090b0;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    #reset-btn:hover, #settings-btn:hover, #history-btn:hover { border-color: #a78bfa; color: #a78bfa; }

    #settings-btn { padding: 6px 10px; font-size: 1rem; }

    #model-select {
      background: #0f172a;
      border: 1px solid #3a3a5c;
      color: #9090b0;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    #model-select:hover, #model-select:focus { border-color: #a78bfa; color: #a78bfa; }

    .settings-menu {
      display: none;
      position: absolute;
      top: 52px;
      right: 16px;
      background: #1e293b;
      border: 1px solid #2a3a50;
      border-radius: 10px;
      padding: 6px 0;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .settings-menu.open { display: block; }
    .settings-menu a {
      display: block;
      padding: 10px 16px;
      color: #c8c8e0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .settings-menu a:hover { background: #2a3a50; color: #e8e8f0; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: #4c1d95; color: #ddd6fe; }
    .message.assistant .avatar { background: #1e3a5f; color: #93c5fd; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 1rem;
      max-width: calc(100% - 48px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #4c1d95;
      color: #ede9fe;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e293b;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a3a50;
    }

    .bubble.streaming::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      opacity: 0.7;
    }

    @keyframes blink { 0%, 100% { opacity: 0.7; } 50% { opacity: 0; } }

    .bubble p { margin-bottom: 0.6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ol, .bubble ul { padding-left: 1.4em; margin: 0.4em 0; }
    .bubble li { margin-bottom: 0.3em; }
    .bubble strong { color: #c4b5fd; }
    .bubble code {
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .bubble a.fb-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #0d2a1a;
      color: #6ee7b7;
      border: 1px solid #1a4a30;
      padding: 1px 8px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9em;
    }
    .bubble a.fb-link:hover { background: #163d25; color: #a7f3d0; }
    .bubble a {
      color: #93c5fd;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .bubble a:hover { color: #bfdbfe; }

    #welcome {
      margin: auto;
      text-align: center;
      color: #6060a0;
      padding: 40px 20px;
    }
    #welcome h2 { font-size: 1.5rem; color: #9090c0; margin-bottom: 8px; }
    #welcome p { font-size: 1rem; line-height: 1.6; }

    footer {
      background: #16213e;
      border-top: 1px solid #2a2a4a;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #2a3a50;
      border-radius: 12px;
      color: #e8e8f0;
      font-size: 1rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 44px;
      max-height: 160px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #input:focus { border-color: #a78bfa; }
    #input::placeholder { color: #4a4a70; }

    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 12px;
      color: white;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #send-btn:hover:not(:disabled) { background: #6d28d9; }
    #send-btn:disabled { background: #3a2a5a; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #confirm-overlay.open { display: flex; }
    #confirm-dialog {
      background: #1e293b;
      border: 1px solid #3a3a5c;
      border-radius: 16px;
      padding: 24px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    #confirm-msg {
      line-height: 1.6;
      margin-bottom: 20px;
      font-size: 1rem;
    }
    #confirm-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    #confirm-no {
      background: none;
      border: 1px solid #3a3a5c;
      color: #9090b0;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    #confirm-no:hover { border-color: #f87171; color: #f87171; }
    #confirm-yes {
      background: #7c3aed;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      transition: background 0.2s;
    }
    #confirm-yes:hover { background: #6d28d9; }

    @media (max-width: 600px) {
      .bubble { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Fatharr</h1>
  <div class="header-buttons">
    <select id="model-select" title="AI Model">
      <option value="cheap">Cheap</option>
      <option value="standard" selected>Standard</option>
      <option value="smart">Smart</option>
    </select>
    <button id="history-btn" title="Chat history" style="padding:6px 10px;font-size:1rem;">&#9776;</button>
    <button id="reset-btn">New chat</button>
    <button id="settings-btn" title="Settings">&#9881;</button>
  </div>
  <div class="settings-menu" id="settings-menu">
    <a href="/setup">Settings</a>
    <a href="#" id="rerun-onboard-link">Re-run onboarding</a>
  </div>
  <div class="settings-menu" id="history-menu" style="right:auto;left:auto;">
    <div id="history-list" style="max-height:300px;overflow-y:auto;">
      <span style="display:block;padding:10px 16px;color:#6060a0;font-size:0.85rem;">No previous chats</span>
    </div>
  </div>
</header>

<div id="messages">
  <div id="welcome">
    <h2>How can I help?</h2>
    <p>Ask me anything — finding movies, requesting content,<br>or any tech questions you have.</p>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-dialog">
    <p id="confirm-msg"></p>
    <div id="confirm-buttons">
      <button id="confirm-no">No, cancel</button>
      <button id="confirm-yes">Yes, proceed</button>
    </div>
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const welcomeEl  = document.getElementById('welcome');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const resetBtn   = document.getElementById('reset-btn');

  const settingsBtn  = document.getElementById('settings-btn');
  const settingsMenu = document.getElementById('settings-menu');
  const modelSelect  = document.getElementById('model-select');

  // Persist model choice
  const savedModel = localStorage.getItem('selectedModel');
  if (savedModel) modelSelect.value = savedModel;
  modelSelect.addEventListener('change', () => localStorage.setItem('selectedModel', modelSelect.value));

  const historyBtn  = document.getElementById('history-btn');
  const historyMenu = document.getElementById('history-menu');
  const historyList = document.getElementById('history-list');

  settingsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    historyMenu.classList.remove('open');
    settingsMenu.classList.toggle('open');
  });

  historyBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    settingsMenu.classList.remove('open');
    historyMenu.classList.toggle('open');
    if (historyMenu.classList.contains('open')) await loadHistory();
  });

  document.addEventListener('click', () => {
    settingsMenu.classList.remove('open');
    historyMenu.classList.remove('open');
  });

  // Re-run onboarding: reset flag, go to setup wizard first, then onboarding chat
  document.getElementById('rerun-onboard-link').addEventListener('click', async (e) => {
    e.preventDefault();
    if (!confirm('This will let you review settings, then re-run the server onboarding. Continue?')) return;
    try { await fetch('/api/onboard/reset', { method: 'POST' }); } catch {}
    window.location.href = '/setup?flow=onboard';
  });

  let sessionId = localStorage.getItem('sessionId') || null;
  let isStreaming = false;

  // Auto-submit query from URL param (e.g. ?q=how+do+I+...)
  window.addEventListener('DOMContentLoaded', () => {
    const q = new URLSearchParams(window.location.search).get('q');
    if (q?.trim()) {
      inputEl.value = q.trim();
      setTimeout(sendMessage, 200);
      window.history.replaceState({}, '', '/');
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isStreaming) sendMessage(); });

  resetBtn.addEventListener('click', async () => {
    if (sessionId) {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId })
      });
      sessionId = null;
      localStorage.removeItem('sessionId');
    }
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
  });

  function addMessage(role, text) {
    if (welcomeEl.parentNode) welcomeEl.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (text) bubble.innerHTML = formatText(text);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  function formatText(text) {
    // Escape HTML first
    let out = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Convert Linux-style server paths (/Media/... /USB/...) and any UNC/SMB variants
    // to a clickable FileBrowser link.
    // Matches:  /Media/Movies  \\mcrubes.local\Media\Movies  smb://mcrubes.local/Media/Movies
    const pathToFb = (serverPath) => {
      // Normalise to forward-slash path
      const rel = serverPath
        .replace(/^(smb:)?[\\\/]{0,2}mcrubes\.local[\\\/]?/i, '')
        .replace(/\\/g, '/')
        .replace(/^\//, '');
      // FileBrowser root is /Media — strip the Media prefix for the URL
      const fbPath = rel.replace(/^Media(\/|$)/, '$1').replace(/^\//, '');
      const href = `http://mcrubes.local:8080/files/${fbPath}`.replace(/\/+$/, '');
      const label = fbPath || 'Files';
      return `<a href="${href}" target="_blank" rel="noopener" class="fb-link">📁 ${label}</a>`;
    };

    // UNC paths: \\mcrubes.local\... or \\\\mcrubes.local\\...
    out = out.replace(/\\{1,2}mcrubes\.local\\[^\s<"')]+/gi, (m) => pathToFb(m));
    // SMB URLs: smb://mcrubes.local/...
    out = out.replace(/smb:\/\/mcrubes\.local\/[^\s<"')]+/gi, (m) => pathToFb(m));

    // Strip stray ** before URLs
    out = out.replace(/\*\*(https?:\/\/)/g, '$1');
    out = out.replace(/\*\*(mcrubes\.local)/g, '$1');

    // Linkify http/https URLs FIRST — before path conversion so we don't double-process
    out = out.replace(/(https?:\/\/[^\s<"'*]+)/g, (url) => {
      const clean = url.replace(/[.,;!?)]+$/, '');
      const label = clean.replace(/^https?:\/\//, '');
      return `<a href="${clean}" target="_blank" rel="noopener">${label}</a>`;
    });

    // Linkify bare mcrubes.local:PORT URLs
    out = out.replace(/(?<!["/])(mcrubes\.local:\d+(?:\/[^\s<"'*,;!?)]*)?)/g, (url) => {
      const clean = url.replace(/[.,;!?)]+$/, '');
      return `<a href="http://${clean}" target="_blank" rel="noopener">${clean}</a>`;
    });

    // Bare Linux paths: /Media/... or /USB/...
    // Negative lookbehind — skip if preceded by / " = ' (i.e. already inside a URL or HTML attribute)
    out = out.replace(/(?<![/="'])(\/(Media|USB)(\/[^\s,<`"')\\*]*)?)/g, (m) => pathToFb(m));

    // Markdown: bold, inline code, line breaks — strip any leftover stray **
    out = out
      .replace(/\*\*(.*?)\*\*/gs, '<strong>$1</strong>')
      .replace(/\*\*/g, '')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');

    return out;
  }

  async function loadHistory() {
    try {
      const res = await fetch('/api/sessions');
      const list = await res.json();
      if (!list.length) {
        historyList.innerHTML = '<span style="display:block;padding:10px 16px;color:#6060a0;font-size:0.85rem;">No previous chats</span>';
        return;
      }
      historyList.innerHTML = list.map(s => {
        const active = s.id === sessionId ? ' style="color:#a78bfa;font-weight:600;"' : '';
        const ago = formatTimeAgo(s.lastActive);
        return `<a href="#" data-sid="${s.id}"${active} style="display:block;padding:10px 16px;color:#c8c8e0;text-decoration:none;font-size:0.9rem;transition:background 0.15s;border-bottom:1px solid #1a2438;" onmouseover="this.style.background='#2a3a50'" onmouseout="this.style.background=''"><span style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(s.title)}</span><span style="font-size:0.75rem;color:#6060a0;">${ago}</span></a>`;
      }).join('');
      historyList.querySelectorAll('a[data-sid]').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadSession(a.dataset.sid);
          historyMenu.classList.remove('open');
        });
      });
    } catch {}
  }

  function formatTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    return `${days}d ago`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Confirmation modal ──────────────────────────────────────────────────
  const confirmOverlay = document.getElementById('confirm-overlay');
  const confirmMsg     = document.getElementById('confirm-msg');
  const confirmYes     = document.getElementById('confirm-yes');
  const confirmNo      = document.getElementById('confirm-no');

  function showConfirmation(conf) {
    let html = `Are you sure you'd like to <strong>${escapeHtml(conf.action)}</strong>?`;
    if (conf.tier === 3) {
      html += `<br><br><em style="color:#fbbf24;">${escapeHtml(conf.adminName)} highly recommends that you check with them before proceeding for tasks like this.</em>`;
    }
    confirmMsg.innerHTML = html;
    confirmOverlay.classList.add('open');
  }

  function hideConfirmation() {
    confirmOverlay.classList.remove('open');
  }

  confirmYes.addEventListener('click', () => { hideConfirmation(); handleConfirmation(true); });
  confirmNo.addEventListener('click',  () => { hideConfirmation(); handleConfirmation(false); });

  async function handleConfirmation(approved) {
    const responseBubble = addMessage('assistant', '');
    responseBubble.classList.add('streaming');
    isStreaming = true;
    sendBtn.disabled = true;

    let buffer = '';
    let statusText = '';
    const renderBubble = () => {
      responseBubble.innerHTML =
        (buffer ? formatText(buffer) : '') +
        (statusText ? `<em style="color:#7070a0;font-size:0.88em;display:block;margin-top:4px">${statusText}</em>` : '');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    try {
      const res = await fetch('/api/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, approved })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let raw = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        raw += decoder.decode(value, { stream: true });
        const lines = raw.split('\n');
        raw = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text)   { buffer += data.text; statusText = ''; renderBubble(); }
            if (data.status) { statusText = data.status; renderBubble(); }
            if (data.error)  { responseBubble.innerHTML = `<em style="color:#f87171">${data.error}</em>`; }
            if (data.confirmation) { showConfirmation(data.confirmation); }
          } catch {}
        }
      }
    } catch {
      responseBubble.innerHTML = '<em style="color:#f87171">Connection error. Please try again.</em>';
    }

    responseBubble.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadSession(sid) {
    try {
      const res = await fetch(`/api/sessions/${sid}`);
      if (!res.ok) return;
      const data = await res.json();
      sessionId = sid;
      localStorage.setItem('sessionId', sid);
      messagesEl.innerHTML = '';
      // Replay messages (skip seed messages)
      const msgs = data.messages.filter(m => {
        if (m.role === 'user' && m.content === 'What can you do?') return false;
        if (m.role === 'assistant' && m.content.includes('I have the full server reference loaded')) return false;
        return true;
      });
      for (const m of msgs) addMessage(m.role, m.content);
      if (!msgs.length) {
        messagesEl.appendChild(welcomeEl);
        welcomeEl.style.display = '';
      }
    } catch {}
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    addMessage('user', text);
    const responseBubble = addMessage('assistant', '');
    responseBubble.classList.add('streaming');

    let buffer = '';
    let statusText = '';

    const renderBubble = () => {
      responseBubble.innerHTML =
        (buffer ? formatText(buffer) : '') +
        (statusText ? `<em style="color:#7070a0;font-size:0.88em;display:block;margin-top:4px">${statusText}</em>` : '');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId, model: modelSelect.value })
      });

      // Grab session ID from header before streaming
      const newSid = res.headers.get('X-Session-Id');
      if (newSid) {
        sessionId = newSid;
        localStorage.setItem('sessionId', sessionId);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let raw = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        raw += decoder.decode(value, { stream: true });

        const lines = raw.split('\n');
        raw = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              buffer += data.text;
              statusText = '';
              renderBubble();
            }
            if (data.status) {
              statusText = data.status;
              renderBubble();
            }
            if (data.error) {
              responseBubble.innerHTML = `<em style="color:#f87171">${data.error}</em>`;
            }
            if (data.confirmation) {
              showConfirmation(data.confirmation);
            }
          } catch {}
        }
      }
    } catch (err) {
      responseBubble.innerHTML = '<em style="color:#f87171">Connection error. Please try again.</em>';
    }

    responseBubble.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>

</body>
</html>
